<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Icon: Stylized lamp of knowledge with open book -->
  <defs>
    <linearGradient id="lampGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B8FB9"/>
      <stop offset="100%" style="stop-color:#2B4C7E"/>
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B876"/>
      <stop offset="100%" style="stop-color:#C9A962"/>
    </linearGradient>
  </defs>
  
  <!-- Lamp/Book base shape -->
  <g transform="translate(10, 15)">
    <!-- Open Book -->
    <path d="M8 45 L8 80 Q25 75 35 80 Q45 75 52 80 L52 45 Q45 40 35 45 Q25 40 8 45" fill="#E8ECF1" stroke="#2B4C7E" stroke-width="1.5"/>
    
    <!-- Book pages line -->
    <path d="M30 50 L30 75" stroke="#2B4C7E" stroke-width="1" opacity="0.5"/>
    
    <!-- Lamp body -->
    <path d="M20 35 Q20 20 30 15 Q40 20 40 35 L40 40 Q30 45 20 40 Z" fill="url(#lampGradient)"/>
    
    <!-- Lamp top (wisdom glow) -->
    <ellipse cx="30" cy="12" rx="8" ry="4" fill="url(#goldGradient)"/>
    
    <!-- Lamp handle -->
    <path d="M22 38 Q15 35 15 28 Q15 22 22 20" stroke="url(#lampGradient)" stroke-width="2" fill="none"/>
    
    <!-- Rising chart line (success/growth) -->
    <path d="M55 55 L65 45 L75 50 L85 35" stroke="#C9A962" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="85" cy="35" r="3" fill="#C9A962"/>
  </g>
  
  <!-- Text: Aspire Academic Co. -->
  <text x="110" y="45" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#2D3748">Aspire</text>
  <text x="110" y="75" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="#6B7280">Academic Co.</text>
</svg>