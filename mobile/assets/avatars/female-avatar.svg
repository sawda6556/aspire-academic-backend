<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Female Avatar - Modest Hijab with blank face -->
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="50" fill="#E8ECF1"/>
  
  <!-- Body/Shoulders -->
  <ellipse cx="50" cy="90" rx="35" ry="18" fill="#2B4C7E"/>
  
  <!-- Hijab Outer - covers head completely -->
  <path d="M15 50 Q15 15 50 10 Q85 15 85 50 L85 70 Q85 85 50 90 Q15 85 15 70 Z" fill="#2B4C7E"/>
  
  <!-- Hijab Inner - face opening (completely blank - no features) -->
  <ellipse cx="50" cy="50" rx="24" ry="28" fill="#FAFBFC"/>
  
  <!-- Hijab fold detail at top -->
  <path d="M26 35 Q50 28 74 35" stroke="#3D5A8A" stroke-width="1.5" fill="none" opacity="0.3"/>
  
  <!-- Hijab lower drape detail -->
  <path d="M20 65 Q50 75 80 65" stroke="#3D5A8A" stroke-width="1" fill="none" opacity="0.2"/>
  
  <!-- NO eyes, NO mouth, NO nose - face is completely blank -->
</svg>