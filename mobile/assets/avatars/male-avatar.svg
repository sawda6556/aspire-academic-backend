<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Male Avatar - Blank face with beard, moustache, and hair -->
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="50" fill="#E8ECF1"/>
  
  <!-- Body/Shoulders -->
  <ellipse cx="50" cy="90" rx="35" ry="18" fill="#2B4C7E"/>
  
  <!-- Neck -->
  <rect x="40" y="72" width="20" height="15" fill="#2B4C7E"/>
  
  <!-- Head shape - oval -->
  <ellipse cx="50" cy="45" rx="26" ry="30" fill="#FAFBFC"/>
  
  <!-- Hair on top - short styling -->
  <path d="M24 38 Q24 18 50 15 Q76 18 76 38 Q76 30 50 28 Q24 30 24 38" fill="#2B4C7E"/>
  
  <!-- Hair sides -->
  <path d="M24 38 Q22 45 24 52" stroke="#2B4C7E" stroke-width="4" fill="none"/>
  <path d="M76 38 Q78 45 76 52" stroke="#2B4C7E" stroke-width="4" fill="none"/>
  
  <!-- Beard - covers chin area, completely blank face -->
  <path d="M28 58 Q28 75 50 78 Q72 75 72 58 Q72 65 50 68 Q28 65 28 58" fill="#6B7280" opacity="0.7"/>
  
  <!-- Moustache - above lip area -->
  <path d="M35 62 Q50 58 65 62 Q50 66 35 62" fill="#6B7280" opacity="0.6"/>
  
  <!-- NO eyes, NO mouth, NO nose - face is completely blank -->
</svg>