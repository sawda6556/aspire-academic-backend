<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- Halal-friendly hero banner illustration -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFBFC"/>
      <stop offset="100%" style="stop-color:#E8ECF1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="350" cy="40" r="60" fill="#2B4C7E" opacity="0.05"/>
  <circle cx="50" cy="170" r="40" fill="#5B8FB9" opacity="0.08"/>
  
  <!-- Stack of books -->
  <g transform="translate(60, 80)">
    <!-- Bottom book -->
    <rect x="0" y="50" width="80" height="15" rx="2" fill="#2B4C7E"/>
    <!-- Middle book -->
    <rect x="5" y="35" width="70" height="15" rx="2" fill="#5B8FB9"/>
    <!-- Top book -->
    <rect x="2" y="20" width="75" height="15" rx="2" fill="#C9A962" opacity="0.8"/>
  </g>
  
  <!-- Open laptop -->
  <g transform="translate(160, 70)">
    <rect x="0" y="30" width="100" height="60" rx="5" fill="#2B4C7E" opacity="0.1"/>
    <rect x="10" y="35" width="80" height="50" rx="3" fill="#FAFBFC" stroke="#5B8FB9" stroke-width="2"/>
    <rect x="0" y="85" width="100" height="8" rx="2" fill="#2B4C7E" opacity="0.6"/>
  </g>
  
  <!-- Pencil -->
  <g transform="translate(290, 90) rotate(-30)">
    <rect x="0" y="0" width="80" height="10" rx="1" fill="#C9A962"/>
    <polygon points="80,0 95,5 80,10" fill="#FAFBFC"/>
    <rect x="0" y="0" width="10" height="10" rx="1" fill="#E8A598"/>
  </g>
  
  <!-- Light bulb (ideas) -->
  <g transform="translate(180, 20)">
    <ellipse cx="20" cy="25" rx="18" ry="22" fill="#C9A962" opacity="0.6"/>
    <rect x="12" y="45" width="16" height="10" rx="2" fill="#6B7280"/>
    <line x1="20" y1="5" x2="20" y2="-5" stroke="#C9A962" stroke-width="2"/>
    <line x1="8" y1="12" x2="0" y2="5" stroke="#C9A962" stroke-width="2"/>
    <line x1="32" y1="12" x2="40" y2="5" stroke="#C9A962" stroke-width="2"/>
  </g>
  
  <!-- Small plant -->
  <g transform="translate(320, 120)">
    <rect x="10" y="40" width="30" height="35" rx="3" fill="#7DA08E" opacity="0.7"/>
    <ellipse cx="25" cy="40" rx="20" ry="25" fill="#7DA08E"/>
    <ellipse cx="18" cy="30" rx="8" ry="15" fill="#4BA3A3" opacity="0.6"/>
    <ellipse cx="32" cy="32" rx="8" ry="12" fill="#4BA3A3" opacity="0.5"/>
  </g>
  
  <!-- Notepad -->
  <g transform="translate(280, 140)">
    <rect x="0" y="0" width="50" height="60" rx="3" fill="#FAFBFC" stroke="#E8ECF1" stroke-width="1"/>
    <line x1="10" y1="15" x2="40" y2="15" stroke="#5B8FB9" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="25" x2="40" y2="25" stroke="#5B8FB9" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="35" x2="40" y2="35" stroke="#5B8FB9" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="45" x2="30" y2="45" stroke="#5B8FB9" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Geometric decorations -->
  <polygon points="50,30 65,45 50,60 35,45" fill="#5B8FB9" opacity="0.1"/>
  <polygon points="370,150 385,165 370,180 355,165" fill="#C9A962" opacity="0.15"/>
</svg>