name: mobile
description: Aspire Academic Co. Mobile App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  socket_io_client: ^3.0.0
  intl: ^0.19.0
  url_launcher: ^6.2.5
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/avatars/
    - assets/illustrations/
    - assets/logo/
    - assets/ui/
    - assets/ui/contact/
    - assets/ui/dashboard/
    - assets/ui/public/
    - assets/ui/store/
